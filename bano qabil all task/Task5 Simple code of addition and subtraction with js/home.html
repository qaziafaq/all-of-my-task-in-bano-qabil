<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 class="page-title">Testing of Simple Increase and Decrease</h2>

<div class="card">

  <h1 id="counterDisplay">0</h1>

  <div class="buttons">
    <button id="increaseFiveBtn">+5 Increment</button>
    <button id="increaseTenBtn">+10 Increment</button>
    <button id="decreaseFiveBtn">-5 Decrement</button>
    <button id="decreaseTenBtn">-10 Decrement</button>
  </div>

</div>

<script src="work.js"></script>
</body>
</html>

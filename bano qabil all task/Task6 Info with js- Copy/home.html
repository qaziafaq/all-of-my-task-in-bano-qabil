<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Info Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Enter Your Info</h2>
        <form id="userForm">
            <input type="text" id="nameInput" placeholder="Enter Name" required>
            <input type="number" id="ageInput" placeholder="Enter Age" required>
            <input type="text" id="cityInput" placeholder="Enter City" required>
            <input type="text" id="countryInput" placeholder="Enter Country" required>
            <input type="email" id="emailInput" placeholder="Enter Email" required>
            <button type="submit" id="submitBtn">Submit</button>
        </form>
        <div class="result" id="resultDisplay" style="display: none;">
        </div>
    </div>
    <script src="work.js"></script>
</body>
</html>
